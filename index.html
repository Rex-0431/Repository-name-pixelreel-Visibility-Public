<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PixelReel</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 40px;
}
input, select, button {
  margin: 10px;
  padding: 10px;
  width: 250px;
}
button {
  background: #00e5a0;
  border: none;
  font-weight: bold;
}
img {
  margin-top: 20px;
  max-width: 200px;
}
</style>
</head>

<body>

<h1>PixelReel 🎬</h1>

<input type="file" id="fileInput" accept="image/*"><br>

<input type="text" id="promptInput" placeholder="Describe your video"><br>

<select id="duration">
  <option value="5">5 sec</option>
  <option value="10">10 sec</option>
  <option value="15">15 sec</option>
</select><br>

<select id="count">
  <option value="1">1 Video</option>
  <option value="3">3 Videos</option>
</select><br>

<select id="music">
  <option>Cinematic</option>
  <option>Upbeat</option>
  <option>Calm</option>
</select><br>

<button onclick="handleExport()">Export Video</button>

<div id="preview"></div>

<br><br>
<a id="downloadLink" style="display:none;color:#00e5a0;" download>Download Video</a>

<script>
const BACKEND = 'https://pixelreel.onrender.com';
const RZP_KEY = 'rzp_test_Shn8u2MBIVd6vS';

let file = null;

// ---------- IMAGE ----------
document.getElementById('fileInput').addEventListener('change', (e) => {
  file = e.target.files[0];

  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('preview').innerHTML =
      `<img src="${ev.target.result}">`;
  };
  reader.readAsDataURL(file);
});

// ---------- PRICE ----------
function calculatePrice(duration, count) {
  duration = parseInt(duration);
  count = parseInt(count);

  if (duration === 5) return count === 1 ? 199 : 599;
  if (duration === 10) return count === 1 ? 499 : 1099;
  if (duration === 15) return count === 1 ? 999 : 1999;

  return 199;
}

// ---------- VIDEO ----------
async function createVideo() {
  const formData = new FormData();
  formData.append('image', file);
  formData.append('prompt', document.getElementById('promptInput').value);

  const res = await fetch(BACKEND + '/generate-video', {
    method: 'POST',
    body: formData
  });

  if (!res.ok) throw new Error();

  const data = await res.json();
  return data.url;
}

// ---------- EXPORT ----------
async function handleExport() {

  if (!file) {
    alert("Upload image first");
    return;
  }

  const duration = document.getElementById('duration').value;
  const count = document.getElementById('count').value;

  const price = calculatePrice(duration, count);

  try {

    const orderRes = await fetch(BACKEND + '/create-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: price * 100 })
    });

    const order = await orderRes.json();

    const options = {
      key: RZP_KEY,
      amount: order.amount,
      currency: "INR",
      name: "PixelReel",
      description: "Video Export",
      order_id: order.id,

      handler: async function () {
        try {
          const url = await createVideo();

          const link = document.getElementById('downloadLink');
          link.href = url;
          link.style.display = 'block';
          link.innerText = "Download Video";

        } catch {
          alert("Video failed");
        }
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch {
    alert("Server error");
  }
}
</script>

</body>
</html>
