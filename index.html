<!DOCTYPE html>

<html>
<body>

<h2>Image → Video Generator</h2>

<input type="file" id="fileInput" /><br><br>

<input type="text" id="instructions" placeholder="Instructions (zoom, black and white, bright)" /><br><br>

<input type="number" id="duration" placeholder="Duration (seconds)" /><br><br>

<button onclick="upload()">Generate Video</button>

<div id="result"></div>

<script>
async function upload() {
  const file = document.getElementById("fileInput").files[0];
  const instructions = document.getElementById("instructions").value;
  const duration = document.getElementById("duration").value;

  const formData = new FormData();
  formData.append("image", file);
  formData.append("instructions", instructions);
  formData.append("duration", duration);

  const res = await fetch("http://localhost:5000/generate-video", {
    method: "POST",
    body: formData
  });

  const blob = await res.blob();
  const videoUrl = URL.createObjectURL(blob);

  document.getElementById("result").innerHTML =
    `<video controls width="400" src="${videoUrl}"></video>`;
}
</script>

</body>
</html>
