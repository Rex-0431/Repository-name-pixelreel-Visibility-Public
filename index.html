<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PixelReel</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 420px;
  background: #111;
  padding: 25px;
  border-radius: 12px;
  border: 1px solid #222;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

input, select, button {
  margin: 10px 0;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  border: 1px solid #222;
  background: #1a1a1a;
  color: #fff;
}

button {
  background: #00e5a0;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00c98a;
}

img {
  margin-top: 15px;
  max-width: 100%;
  border-radius: 10px;
}

.price-box {
  margin-top: 10px;
  color: #00e5a0;
  font-weight: bold;
}

.loader {
  display: none;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>PixelReel 🎬</h1>

  <input type="file" id="fileInput" accept="image/*">

  <input type="text" id="promptInput" placeholder="Describe your video">

  <select id="duration" onchange="updatePriceUI()">
    <option value="5">5 sec</option>
    <option value="10">10 sec</option>
    <option value="15">15 sec</option>
  </select>

  <select id="count" onchange="updatePriceUI()">
    <option value="1">1 Video</option>
    <option value="3">3 Videos</option>
  </select>

  <select id="music">
    <option>Cinematic</option>
    <option>Upbeat</option>
    <option>Calm</option>
  </select>

  <div class="price-box" id="priceBox">Price: ₹199</div>

  <button onclick="handleExport()">Export Video</button>

  <div id="loader" class="loader">Creating video... ⏳</div>

  <div id="preview"></div>

  <br>
  <a id="downloadLink" style="display:none;color:#00e5a0;" download>
    Download Video
  </a>
</div>

<script>
const BACKEND = 'https://pixelreel.onrender.com';
const RZP_KEY = 'rzp_test_Shn8u2MBIVd6vS';

let file = null;

// IMAGE UPLOAD
document.getElementById('fileInput').addEventListener('change', (e) => {
  file = e.target.files[0];

  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('preview').innerHTML =
      `<img src="${ev.target.result}">`;
  };
  reader.readAsDataURL(file);
});

// PRICE LOGIC
function calculatePrice(duration, count) {
  duration = parseInt(duration);
  count = parseInt(count);

  if (duration === 5) return count === 1 ? 199 : 599;
  if (duration === 10) return count === 1 ? 499 : 1099;
  if (duration === 15) return count === 1 ? 999 : 1999;

  return 199;
}

// UPDATE PRICE UI
function updatePriceUI() {
  const duration = document.getElementById('duration').value;
  const count = document.getElementById('count').value;

  const price = calculatePrice(duration, count);
  document.getElementById('priceBox').innerText = "Price: ₹" + price;
}

// CREATE VIDEO
async function createVideo() {
  const formData = new FormData();
  formData.append('image', file);
  formData.append('prompt', document.getElementById('promptInput').value);
  formData.append('music', document.getElementById('music').value);

  const res = await fetch(BACKEND + '/generate-video', {
    method: 'POST',
    body: formData
  });

  if (!res.ok) throw new Error();

  const data = await res.json();
  return data.url;
}

// EXPORT
async function handleExport() {

  if (!file) {
    alert("Upload image first");
    return;
  }

  const duration = document.getElementById('duration').value;
  const count = document.getElementById('count').value;

  const price = calculatePrice(duration, count);

  try {

    const orderRes = await fetch(BACKEND + '/create-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: price * 100 })
    });

    const order = await orderRes.json();

    const options = {
      key: RZP_KEY,
      amount: order.amount,
      currency: "INR",
      name: "PixelReel",
      description: "Video Export",
      order_id: order.id,

      handler: async function () {
        document.getElementById('loader').style.display = 'block';

        try {
          const url = await createVideo();

          document.getElementById('loader').style.display = 'none';

          const link = document.getElementById('downloadLink');
          link.href = url;
          link.style.display = 'block';
          link.innerText = "Download Video";

        } catch {
          document.getElementById('loader').style.display = 'none';
          alert("Video failed");
        }
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch {
    alert("Server error");
  }
}
</script>

</body>
</html>
