<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PixelReel (Test Mode)</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 420px;
  background: #111;
  padding: 25px;
  border-radius: 12px;
  border: 1px solid #222;
  text-align: center;
}

h1 { margin-bottom: 20px; }

input, select, button {
  margin: 10px 0;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  border: 1px solid #222;
  background: #1a1a1a;
  color: #fff;
}

button {
  background: #00e5a0;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

button:hover { background: #00c98a; }

img {
  margin-top: 15px;
  max-width: 100%;
  border-radius: 10px;
}

.loader {
  display: none;
  margin-top: 15px;
  color: #00e5a0;
}
</style>
</head>

<body>

<div class="container">
  <h1>PixelReel 🎬 (Test)</h1>

  <input type="file" id="fileInput" accept="image/*">

  <input type="text" id="promptInput" placeholder="Describe your video">

  <select id="duration">
    <option value="5">5 sec</option>
    <option value="10">10 sec</option>
    <option value="15">15 sec</option>
  </select>

  <select id="count">
    <option value="1">1 Video</option>
    <option value="3">3 Videos</option>
  </select>

  <select id="music">
    <option>Cinematic</option>
    <option>Upbeat</option>
    <option>Calm</option>
  </select>

  <button onclick="handleExport()">Generate Video</button>

  <div id="loader" class="loader">Creating video... ⏳</div>

  <div id="preview"></div>

  <br>
  <a id="downloadLink" style="display:none;color:#00e5a0;" download>
    Download Video
  </a>
</div>

<script>
const BACKEND = 'https://pixelreel.onrender.com';

let file = null;

// IMAGE UPLOAD
document.getElementById('fileInput').addEventListener('change', (e) => {
  file = e.target.files[0];

  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('preview').innerHTML =
      `<img src="${ev.target.result}">`;
  };
  reader.readAsDataURL(file);
});

// CREATE VIDEO
async function createVideo() {
  const formData = new FormData();
  formData.append('image', file);
  formData.append('prompt', document.getElementById('promptInput').value);
  formData.append('music', document.getElementById('music').value);
  formData.append('duration', document.getElementById('duration').value);
  formData.append('count', document.getElementById('count').value);

  const res = await fetch(BACKEND + '/generate-video', {
    method: 'POST',
    body: formData
  });

  if (!res.ok) throw new Error();

  const data = await res.json();
  return data.url;
}

// EXPORT (NO PAYMENT)
async function handleExport() {

  if (!file) {
    alert("Upload image first");
    return;
  }

  document.getElementById('loader').style.display = 'block';

  try {
    const url = await createVideo();

    document.getElementById('loader').style.display = 'none';

    const link = document.getElementById('downloadLink');
    link.href = url;
    link.style.display = 'block';
    link.innerText = "Download Video";

  } catch (err) {
    document.getElementById('loader').style.display = 'none';
    alert("Video generation failed");
  }
}
</script>

</body>
</html>
